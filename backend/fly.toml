# fly.toml app configuration file generated for backend-portfolio-app on 2026-03-14T02:20:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-portfolio-app'
primary_region = 'iad'

[build]

[env]
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
